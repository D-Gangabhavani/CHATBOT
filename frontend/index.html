<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Workspace</title>
    <!-- Google Fonts & Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <!-- External Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container" id="app-container">
        
        <!-- --- SIDEBAR PANEL --- -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <button class="icon-btn" id="menu-toggle-close">
                    <span class="material-symbols-rounded">menu</span>
                </button>
                <button class="new-chat-action" id="new-chat-btn">
                    <span class="material-symbols-rounded">add</span>
                    New chat
                </button>
            </div>

            <div class="recents-section">
                <h2 class="section-title">Recent</h2>
                <div class="conversations-list" id="conversations-list">
                    <!-- Chat history items will dynamically inject here -->
                </div>
            </div>
        </aside>

        <!-- --- MAIN WORKSPACE --- -->
        <main class="main-workspace">
            
            <!-- Top Navigation Bar -->
            <nav class="top-nav-bar">
                <button class="icon-btn" id="menu-toggle-open">
                    <span class="material-symbols-rounded">menu</span>
                </button>
                
                <button class="icon-btn" id="theme-toggle-btn">
                    <span class="material-symbols-rounded">dark_mode</span>
                </button>
            </nav>

            <!-- Messages Stream Container -->
            <div class="messages-container" id="messages-container">
                <div class="hero-screen" id="hero-screen">
                    <h1>What’s on your mind? Let’s build something great.</h1>
                </div>
            </div>

            <!-- Input Window Form Layer -->
            <div class="input-container-zone">
                <form class="pill-search-box" id="chat-form">
                    <input type="text" id="user-input" placeholder="Ask anything" autocomplete="off">
                    <button type="submit" class="submit-action-btn">
                        <span class="material-symbols-rounded">arrow_upward</span>
                    </button>
                </form>
            </div>

        </main>
    </div>

    <!-- --- PREMIUM CUSTOM MODAL DIALOG (DELETE CONFIRMATION POPUP) --- -->
    <div id="custom-confirm-modal" class="custom-confirm-modal">
        <div class="modal-content-card">
            <div class="modal-title">Delete Chat</div>
            <div id="modal-msg-text" class="modal-description">Are you sure you want to delete this conversation?</div>
            <div class="modal-actions-wrapper">
                <button id="modal-cancel-btn" class="modal-btn cancel-btn">Cancel</button>
                <button id="modal-confirm-btn" class="modal-btn confirm-btn">Delete</button>
            </div>
        </div>
    </div>

    <!-- External JavaScript Architecture -->
    <script src="app.js"></script>
</body>
</html>
